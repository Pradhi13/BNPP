openapi: 3.0.3
info:
  title: DiscountSale
  description: Get best discounts for your book
  termsOfService: http://swagger.io/terms/  # Fixed URL
  contact:
    email: apiteam@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.11
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
  - url: http://localhost:8080/api

paths:
  /calculate-price:
    post:
      summary: Calculate optimal book discount price
      operationId: calculateBookPrice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Books'
      responses:
        '200':
          description: Order pricing with best groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid input

components:
  schemas:
    BookItems:
      type: object
      required: [title, quantity]
      x-constructor: all-args
      properties:
        title:
          type: string
          example: "Clean Code"
        quantity:
          type: integer
          minimum: 0
          example: 2
      description: Book title and quantity

    Books:
      type: object
      required: [books]
      x-constructor: all-args
      properties:
        books:
          type: array
          items:
            $ref: '#/components/schemas/BookItems'
          minItems: 1
      example:
        books:
          - title: "Clean Code"
            quantity: 2

    GroupDetails:
      type: object
      required: [books, groupSize, discountPercentage, afterdiscountPrice]
      x-constructor: all-args
      properties:
        books:
          type: array
          items:
            type: string
          example: ["Clean Code"]
        groupSize:
          type: integer
          example: 1
        discountPercentage:
          type: number
          format: double
          example: 0.0
        afterdiscountPrice:
          type: number
          format: double
          example: 50.0
      description: Discounted group details
    OrderResponse:
      type: object
      required: [groups, totalPrice, discountedPrice]
      x-constructor: all-args
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupDetails'
        totalPrice:
          type: number
          format: double
          example: 100.0
        discountedPrice:
          type: number
          format: double
          example: null
      example:
        groups: []
        totalPrice: 100.0
        discountedPrice: null
    PriceResult:
      type: object
      required: [ price, groups ]
      x-constructor: all-args
      properties:
        price:
          type: number
          format: double
          example: 80.0
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupDetails'
      description: Final calculated price and group details